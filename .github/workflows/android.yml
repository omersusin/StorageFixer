name: Android Reusable Workflow

on:
  workflow_call:
    inputs:
      gradle-task:
        required: true
        type: string

      upload-artifact:
        required: false
        type: boolean
        default: false

      artifact-name:
        required: false
        type: string
        default: apk

      artifact-path:
        required: false
        type: string
        default: ""

      create-release:
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"

      - name: Build
        run: gradle ${{ inputs.gradle-task }} --no-daemon
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Upload Artifact
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}

      - name: Create Release
        if: inputs.create-release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ inputs.artifact-path }}
